<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="author" content="MachX Cycles" />

    <!-- Always-static brand tags. Per-page title, description, canonical, OG,
         and Twitter tags are all set by react-helmet-async on each route — DO
         NOT add fallbacks for those here, or they'll appear twice in the
         prerendered HTML and OG scrapers will read the generic site default
         first instead of the per-page version. -->
    <title>MachX Cycles</title>
    <meta property="og:site_name" content="MachX Cycles" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Theme color (matches navbar bg-gray-950) -->
    <meta name="theme-color" content="#030712" />
  </head>
  <body class="bg-gray-950">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
