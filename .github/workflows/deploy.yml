name: Deploy to AWS

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  FRONTEND_BUCKET: machx-cycles-frontend
  CLOUDFRONT_ID: E1DA2WCWTOBSNO

jobs:
  prepare:
    name: Merge claude.ai changes into main (if needed)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
    steps:
      - name: Decide what to do
        id: decide
        run: |
          # should_deploy must be set ONLY when we actually want to deploy.
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ startsWith(github.head_ref, 'claude/') }}" == "true" ]]; then
            echo "mode=merge_pr"      >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" && "${{ startsWith(github.ref, 'refs/heads/claude/') }}" == "true" ]]; then
            echo "mode=merge_branch"  >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "mode=passthrough"   >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=passthrough"   >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "mode=skip"           >> $GITHUB_OUTPUT
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.decide.outputs.mode == 'merge_branch'
        with:
          fetch-depth: 0

      - name: Merge claude branch into main
        if: steps.decide.outputs.mode == 'merge_branch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge --no-ff "origin/${{ github.ref_name }}" -m "Auto-merge ${{ github.ref_name }}"
          git push origin main
          git push origin --delete "${{ github.ref_name }}" || true

      - name: Merge PR into main
        if: steps.decide.outputs.mode == 'merge_pr'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --squash --delete-branch ${{ github.event.pull_request.number }} --repo ${{ github.repository }}

  deploy-backend:
    name: Deploy Lambda functions
    needs: [prepare]
    if: needs.prepare.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run deploy.sh
        working-directory: backend
        run: bash deploy.sh

  # NOTE: deploy-frontend job removed.
  # Frontend deploys are done manually via the local AWS CLI flow (much faster
  # than waiting for CI; we bypass the puppeteer prerender step which has been
  # flaky in CI). See: cd frontend && npm run build && aws s3 sync ...
  # If you ever need to re-enable, the prior job definition is in git history.
  _disabled_frontend:
    name: Build + sync frontend to S3 (DISABLED — manual deploy)
    needs: [prepare]
    if: false  # never runs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Write .env for build
        working-directory: frontend
        run: |
          cat > .env <<'EOF'
          VITE_API_BASE_URL=https://bs4rhhaumi.execute-api.us-east-1.amazonaws.com/prod
          VITE_COGNITO_USER_POOL_ID=us-east-1_XBpo1Myjc
          VITE_COGNITO_CLIENT_ID=6kbpbtjq70orm7p7tm4mcjckv9
          VITE_COGNITO_REGION=us-east-1
          VITE_STRIPE_PUBLISHABLE_KEY=pk_live_51T3q0lGcAJKXJ7cgM6I06dZK4ypWzZ1SvZfaduzwv9InkPRHXZLQvplFeijS7sjb7eL8QQSxzD7zY6SkC0JlA0CN00kjBLoifM
          EOF

      - name: Build
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Sync to S3 (per-prefix Cache-Control)
        # Hashed assets (assets/index-XXXXXXXX.js etc.) are immutable — long
        # cache forever. HTML files change on every deploy — short cache so
        # inventory updates land within minutes. Static brand assets get a
        # comfortable middle. Order matters: the first sync is the only one
        # with --delete (cleans orphans); subsequent syncs only update headers
        # on already-uploaded files.
        run: |
          # Pass 1: HTML (default) — short cache + delete orphans
          aws s3 sync frontend/dist/ "s3://${FRONTEND_BUCKET}/" \
            --delete \
            --cache-control "public, max-age=300, must-revalidate" \
            --exclude "assets/*" \
            --exclude "*.png" --exclude "*.svg" --exclude "*.jpg" --exclude "*.webp" --exclude "*.ico" \
            --exclude "sitemap.xml" --exclude "robots.txt" \
            --region "$AWS_REGION"

          # Pass 2: hashed bundle assets — immutable, 1 year
          aws s3 sync frontend/dist/ "s3://${FRONTEND_BUCKET}/" \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*" --include "assets/*" \
            --region "$AWS_REGION"

          # Pass 3: brand images / favicons — 30 days
          aws s3 sync frontend/dist/ "s3://${FRONTEND_BUCKET}/" \
            --cache-control "public, max-age=2592000" \
            --exclude "*" --include "*.png" --include "*.svg" --include "*.jpg" --include "*.webp" --include "*.ico" \
            --region "$AWS_REGION"

          # Pass 4: sitemap + robots — 1 hour (so crawlers re-pick up new bikes)
          aws s3 sync frontend/dist/ "s3://${FRONTEND_BUCKET}/" \
            --cache-control "public, max-age=3600" \
            --exclude "*" --include "sitemap.xml" --include "robots.txt" \
            --region "$AWS_REGION"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_ID" \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text
