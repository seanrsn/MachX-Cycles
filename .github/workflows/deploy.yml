name: Deploy to AWS

on:
  push:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  FRONTEND_BUCKET: machx-cycles-frontend
  CLOUDFRONT_ID: E1DA2WCWTOBSNO

jobs:
  deploy-backend:
    name: Deploy Lambda functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run deploy.sh
        working-directory: backend
        run: bash deploy.sh

  deploy-frontend:
    name: Build + sync frontend to S3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Write .env for build
        working-directory: frontend
        run: |
          cat > .env <<'EOF'
          VITE_API_BASE_URL=https://bs4rhhaumi.execute-api.us-east-1.amazonaws.com/prod
          VITE_COGNITO_USER_POOL_ID=us-east-1_XBpo1Myjc
          VITE_COGNITO_CLIENT_ID=6kbpbtjq70orm7p7tm4mcjckv9
          VITE_COGNITO_REGION=us-east-1
          VITE_STRIPE_PUBLISHABLE_KEY=pk_live_51T3q0lGcAJKXJ7cgM6I06dZK4ypWzZ1SvZfaduzwv9InkPRHXZLQvplFeijS7sjb7eL8QQSxzD7zY6SkC0JlA0CN00kjBLoifM
          EOF

      - name: Build
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist/ "s3://${FRONTEND_BUCKET}/" \
            --delete \
            --region "$AWS_REGION"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_ID" \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text
